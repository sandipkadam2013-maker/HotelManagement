<div class="container mt-5">
    

  <div class="contact_wrapper">

     <form [formGroup]="contactdetail" (ngSubmit)="submit()">

    <label>Full Name : </label>
    <input type="text" class="form-control" formControlName="fullname" placeholder="Full Name" />
    <label> Email : </label>
    <input type="email" class="form-control" formControlName="email" placeholder="Email" />
    <label> Leave Us Message. </label> <br/>

    <textarea formControlName="message" style="width: 100%; height: 350ox;">    
    </textarea>
    <div class="btn-wrapper"> 
         <button type="submit" class="btn btn-primary btn-sm"> Submit </button> &nbsp;&nbsp;
         <button type="reset" class="btn btn-warning btn-sm"> Reset </button>
    </div>

  </form>



  </div>



</div>
